<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Extended Phaser Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>

<script>

/*
FEATURES IMPLEMENTED:

1) Jump with Spacebar
- Player now jumps using the spacebar instead of only the up arrow.

5) Spikes (Hazards)
- Spikes are placed on platforms and damage the player when touched.

7) Apples (Different Collectible Value)
- Apples act as a secondary collectible worth more points than stars.

8) Level Design (Platforms Change Per Level)
- Each level has different platform layouts and layouts become more difficult.

9) Level Progression System
- When all stars are collected, the game advances to the next level with increased difficulty.
*/

var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 300 },
            debug: false
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

var player;
var stars;
var bombs;
var platforms;
var cursors;
var spikes;
var apples;
var spaceKey;

var score = 0;
var scoreText;

var level = 1;
var levelText;

var gameOver = false;

var game = new Phaser.Game(config);

function preload ()
{
    this.load.image('sky', 'assets/sky.png');
    this.load.image('ground', 'assets/platform.png');
    this.load.image('star', 'assets/star.png');
    this.load.image('bomb', 'assets/bomb.png');
    this.load.image('spike', 'assets/spike.png');
    this.load.image('apple', 'assets/apple.png');

    this.load.spritesheet('dude', 'assets/dude.png',
        { frameWidth: 32, frameHeight: 48 });
}

function create ()
{
    this.add.image(400, 300, 'sky');

    platforms = this.physics.add.staticGroup();
    spikes = this.physics.add.staticGroup();
    stars = this.physics.add.staticGroup();
    apples = this.physics.add.staticGroup();
    bombs = this.physics.add.group();

    buildLevel.call(this);

    player = this.physics.add.sprite(100, 450, 'dude');
    player.setBounce(0);
    player.setCollideWorldBounds(true);

    this.anims.create({
        key: 'left',
        frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });

    this.anims.create({
        key: 'turn',
        frames: [{ key: 'dude', frame: 4 }],
        frameRate: 20
    });

    this.anims.create({
        key: 'right',
        frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
        frameRate: 10,
        repeat: -1
    });

    cursors = this.input.keyboard.createCursorKeys();
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    scoreText = this.add.text(16, 16, 'Score: 0', { fontSize: '32px', fill: '#000' });
    levelText = this.add.text(600, 16, 'Level: 1', { fontSize: '32px', fill: '#000' });

    this.physics.add.collider(player, platforms);
    this.physics.add.collider(stars, platforms);
    this.physics.add.collider(apples, platforms);
    this.physics.add.collider(bombs, platforms);

    this.physics.add.overlap(player, stars, collectStar, null, this);
    this.physics.add.overlap(player, apples, collectApple, null, this);

    this.physics.add.collider(player, bombs, hitBomb, null, this);
    this.physics.add.collider(player, spikes, hitSpike, null, this);
}

function update ()
{
    if (gameOver) return;

    if (cursors.left.isDown)
    {
        player.setVelocityX(-160);
        player.anims.play('left', true);
    }
    else if (cursors.right.isDown)
    {
        player.setVelocityX(160);
        player.anims.play('right', true);
    }
    else
    {
        player.setVelocityX(0);
        player.anims.play('turn');
    }

    if (spaceKey.isDown && player.body.blocked.down)
    {
        player.setVelocityY(-330);
    }
}

// LEVEL DESIGN 
function buildLevel()
{
    platforms.clear(true, true);
    spikes.clear(true, true);
    stars.clear(true, true);
    apples.clear(true, true);

    platforms.create(400, 568, 'ground').setScale(2).refreshBody();

    if (level === 1)
    {
        platforms.create(600, 400, 'ground');
        platforms.create(50, 250, 'ground');

        spikes.create(600, 370, 'spike').setScale(0.25).refreshBody();

        // SAFE STAR POSITIONS
        stars.create(100, 200, 'star');
        stars.create(300, 150, 'star');
        stars.create(650, 300, 'star');
    }

    else if (level === 2)
    {
        platforms.create(650, 420, 'ground');
        platforms.create(150, 320, 'ground');

        spikes.create(650, 390, 'spike').setScale(0.25).refreshBody();
        spikes.create(150, 290, 'spike').setScale(0.25).refreshBody();

        stars.create(120, 200, 'star');
        stars.create(400, 180, 'star');
        stars.create(600, 300, 'star');
    }

    else
    {
        platforms.create(600, 400, 'ground');
        platforms.create(200, 300, 'ground');
        platforms.create(700, 200, 'ground');

        spikes.create(600, 370, 'spike').setScale(0.25).refreshBody();
        spikes.create(200, 270, 'spike').setScale(0.25).refreshBody();
        spikes.create(700, 170, 'spike').setScale(0.25).refreshBody();

        stars.create(150, 200, 'star');
        stars.create(400, 150, 'star');
        stars.create(650, 250, 'star');
    }

    apples.create(250, 200, 'apple');
    apples.create(500, 250, 'apple');
}

function collectStar (player, star)
{
    star.disableBody(true, true);

    score += 10;
    scoreText.setText('Score: ' + score);

    if (stars.countActive(true) === 0)
    {
        level++;
        levelText.setText('Level: ' + level);

        buildLevel.call(this);

        this.physics.world.gravity.y += 50;

        var x = (player.x < 400)
            ? Phaser.Math.Between(400, 800)
            : Phaser.Math.Between(0, 400);

        var bomb = bombs.create(x, 16, 'bomb');
        bomb.setBounce(1);
        bomb.setCollideWorldBounds(true);
        bomb.setVelocity(Phaser.Math.Between(-200 - level * 20, 200 + level * 20), 20);
        bomb.allowGravity = false;
    }
}

// APPLES
function collectApple(player, apple)
{
    apple.disableBody(true, true);

    score += 25;
    scoreText.setText('Score: ' + score);
}

// SPIKES
function hitSpike(player, spike)
{
    score -= 20;
    if (score < 0) score = 0;

    scoreText.setText('Score: ' + score);

    player.setVelocity(-100, -250);
}

// BOMB
function hitBomb (player, bomb)
{
    this.physics.pause();

    player.setTint(0xff0000);
    player.anims.play('turn');

    gameOver = true;
}

</script>

</body>
</html>
