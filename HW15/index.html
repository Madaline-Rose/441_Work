<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Three.js Scene</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>

<body>

<script src="js/three.js"></script>
<script src="js/GLTFLoader.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b1a);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 2, 8);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(5, 5, 5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

// STAR
const star = new THREE.Mesh(
  new THREE.OctahedronGeometry(1),
  new THREE.MeshStandardMaterial({ color: 0xffd700 })
);
star.position.set(-3, 1, 0);
scene.add(star);

// MOON
const moon = new THREE.Mesh(
  new THREE.TorusGeometry(1.2, 0.4, 16, 100),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);
moon.position.set(3, 1, 0);
moon.rotation.x = Math.PI / 2;
scene.add(moon);

// =======================
// FIXED LOADER SETUP
// =======================
const loader = new THREE.GLTFLoader();
let cat;

loader.load('./model.glb', function (gltf) {

  cat = gltf.scene;
  scene.add(cat);

  cat.scale.set(5, 5, 5);
  cat.position.set(0, 0, 0);

  console.log("CAT LOADED");
});

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  star.rotation.y += 0.02;
  star.rotation.x += 0.01;

  moon.rotation.z += 0.01;

  if (cat) {
    cat.rotation.y += 0.01;
  }

  camera.position.x = Math.sin(Date.now() * 0.0005) * 8;
  camera.position.z = Math.cos(Date.now() * 0.0005) * 8;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
